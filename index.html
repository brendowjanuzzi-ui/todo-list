<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Tarefas</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>📝 Tarefas</h1>
            <button id="theme-toggle" onclick="toggleTheme()" style="cursor:pointer; border:none; background:none; font-size: 24px;">🌙</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Digite uma nova tarefa...">
            <button class="btn-add" onclick="addTask()">Adicionar</button>
        </div>

        <div class="filter-group" style="display: flex; gap: 5px; margin-bottom: 15px;">
            <button onclick="filterTasks('all')">Todas</button>
            <button onclick="filterTasks('pending')">Pendentes</button>
            <button onclick="filterTasks('completed')">Feitas</button>
        </div>

        <ul id="taskList"></ul>

        <button class="btn-clear" onclick="clearAll()">Excluir Todas</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
