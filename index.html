<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Tarefas</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <h1>📝 Minhas Tarefas</h1>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Digite uma nova tarefa...">
            <button class="btn-add" onclick="addTask()">Adicionar</button>
        </div>

        <div class="filter-group" style="display: flex; gap: 5px; margin-bottom: 15px;">
            <button onclick="filterTasks('all')" style="flex: 1; font-size: 12px; cursor: pointer;">Todas</button>
            <button onclick="filterTasks('pending')" style="flex: 1; font-size: 12px; cursor: pointer;">Pendentes</button>
            <button onclick="filterTasks('completed')" style="flex: 1; font-size: 12px; cursor: pointer;">Feitas</button>
        </div>

        <ul id="taskList"></ul>

        <button class="btn-clear" onclick="clearAll()">Excluir Todas</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
